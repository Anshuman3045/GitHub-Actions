services:

  nginx_container:
    image: nginx:latest
    container_name: nginx_container
    ports:
      - "8080:80"
    volumes:
      - nginx_data:/usr/share/nginx/html
    environment:
      NGINX_HOST: localhost
      NGINX_PORT: 80
    networks:
      - app_network

  node_container:
    build: .
    image: node:latest
    container_name: node_container
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      NODE_ENV: development
      PORT: 3000
    networks:
      - app_network
    depends_on:
      - nginx_container

networks:
  app_network:

volumes:
  nginx_data: